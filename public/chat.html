<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="chat-page">

    <div class="sidebar">

        <h2>Пользователи</h2>

        <ul id="users"></ul>

    </div>

    <div class="chat-container">

        <div class="chat-top">

            <h1>
                🎮 Чат "Угадай число"
            </h1>

            <button id="startBtn">
                Начать игру
            </button>

        </div>

        <div id="messages"></div>

        <div class="bottom-panel">

            <input
                id="input"
                type="text"
                placeholder="Введите сообщение"
            >

            <button id="sendBtn">
                Отправить
            </button>

        </div>

    </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="chat.js"></script>

</body>
</html>
