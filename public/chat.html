<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Чат</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

</button>

</div>

>

Отправить
</button>

</div>

</div>

</div>

</div>
